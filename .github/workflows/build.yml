name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyinstaller requests beautifulsoup4 pandas openpyxl
      
      - name: Build EXE
        run: |
          pyinstaller --onefile `
            --name "网页采集工具" `
            --add-data "modules;modules" `
            --add-data "config;config" `
            --hidden-import requests `
            --hidden-import bs4 `
            --hidden-import pandas `
            --hidden-import openpyxl `
            --console `
            scripts/process.py
      
      - name: Prepare package
        run: |
          mkdir 交付包
          copy dist\网页采集工具.exe 交付包\
          mkdir 交付包\config
          copy config\sites.json 交付包\config\
          mkdir 交付包\output
      
      - uses: actions/upload-artifact@v4
        with:
          name: demo3-delivery
          path: 交付包/
          retention-days: 90
